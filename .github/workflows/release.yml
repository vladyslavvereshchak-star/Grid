name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build & Publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EP_DRAFT: false
          EP_PRE_RELEASE: false
        run: npx electron-builder --win --x64 --publish always

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $release = gh release view $tag --json isDraft,id 2>$null | ConvertFrom-Json
          if ($release.isDraft -eq $true) {
            gh release edit $tag --draft=false
            Write-Host "Release $tag published!"
          } else {
            Write-Host "Release $tag is already published."
          }
        shell: pwsh
